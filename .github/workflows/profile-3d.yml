# 文件路径: .github/workflows/profile-3d.yml
# 功能: 每天自动更新你的 3D 贡献图（北京时间 03:00 触发）

name: Update 3D Profile Contributions

on:
  # 定时触发：UTC 19:00 = 北京时间次日 03:00
  schedule:
    - cron: "0 19 * * *"   # 每天运行一次

  # 允许手动触发
  workflow_dispatch:

# 必须授予写权限，才能提交图片
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    name: Generate 3D Profile for HelloWorld0525

    steps:
      # 1. 检出代码
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. 生成 3D 贡献图（关键步骤）
      - name: Generate 3D Profile Contributions
        uses: yoshi389111/github-profile-3d-contrib@latest
        env:
          # 使用你自己的高权限 Token
          GITHUB_TOKEN:  ${{ secrets.PROFILE_3D_TOKEN }}
          # 自动使用你的用户名：HelloWorld0525
          USERNAME: ${{ github.repository_owner }}
          # 可选：指定输出目录（默认是 profile-3d-contrib/）
          # OUTPUT_DIR: profile-3d-contrib

      # 3. 提交并推送新生成的图片
      - name: Commit & Push
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add -A .
          if git commit -m "generated"; then
            git push
          fi
